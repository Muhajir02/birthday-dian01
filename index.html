<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kado Spesial Untuk Dian</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Luckiest+Guy&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="bg-music" loop>
        <source src="kembang api.mp4" type="audio/mp4">
    </audio>

    <button id="music-toggle" class="pulse-btn"><i class="fas fa-music"></i></button>

    <div id="door-left" class="door"></div>
    <div id="door-right" class="door"></div>

    <!-- TAHAP 1: Form Login -->
    <div id="login-section" class="screen">
        <div class="login-box glass-card">
            <div class="kunci-hati-icon">
                <i class="fas fa-heart love-bg"></i>
                <i class="fas fa-key key-fg"></i>
            </div>
            <h2>Halo Sayang 👋</h2>
            <p>Masukkan password buat buka kadonya ya!</p>
            <div class="nailong-login-wrapper">
                <input type="password" id="password-input" placeholder="Passwordnya apa hayo?">
                <span id="error-msg" class="hidden">Password salah, coba lagi sayang! 😜</span>
            </div>
            <button id="login-btn" class="pulse-btn">Buka Kado 🎁</button>
        </div>
    </div>

    <!-- TAHAP 2: Kembang Api -->
    <div id="fireworks-section" class="screen hidden">
        <canvas id="fireworks-canvas"></canvas>
        <p id="tap-hint">👆 Tap Layar Untuk Menyalakan Kembang Api 👆</p>
        <div class="fireworks-text" id="dynamic-text"></div>
    </div>

    <!-- TAHAP 3: Galaksi Interaktif -->
    <div id="galaxy-section" class="screen hidden">
        <canvas id="galaxy-canvas"></canvas>
        <div class="center-heart">
            <div class="heart-pulse-wrapper">
                <svg viewBox="0 0 24 24" fill="none" stroke="#ff3366" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                </svg>
            </div>
        </div>
        <div id="orbit-container"></div>
    </div>

    <!-- TAHAP 4: Surat Terketik Otomatis -->
    <div id="typewriter-section" class="screen hidden" style="position:relative; height:auto; overflow-y:auto; padding: 20px;">
        <div id="falling-hearts-container"></div>
        <div class="glass-card" style="width: 100%; max-width: 600px; text-align: left; padding: 30px;">
            <div style="text-align: center; margin-bottom: 20px;">
                <img src="hero-nailong.png" alt="Nailong" style="width: 120px; border-radius: 15px;">
            </div>
            <p id="typewriter-text" class="typewriter"></p>
        </div>
    </div>

    <!-- TAHAP 5: Halaman 7 Foto Memori Romantis (3 Atas, 4 Bawah) -->
    <div id="memories-section" class="screen hidden" style="position:relative; height:auto; overflow-y:auto; padding: 20px;">
        <div class="glass-card" style="width: 100%; max-width: 600px; padding: 30px 15px;">
            <h2 style="font-family: 'Dancing Script', cursive; font-size: 2.8rem; color: #D97706; margin-bottom: 10px;">Our Memories ✨</h2>
            <p style="font-size: 0.9rem; color: #666; margin-bottom: 25px;">Klik fotonya ya sayang...</p>
            
            <div class="memories-grid">
                <!-- Baris Atas (3 Foto Agak Besar) -->
                <div class="mem-row-top">
                    <!-- Ganti link gambar di bawah ini dengan fotomu -->
                    <div class="mem-photo large" onclick="openMemory(0)"><img src="https://via.placeholder.com/300x300/ff9ff3/ffffff?text=Foto+1" alt="Memori 1"></div>
                    <div class="mem-photo large" onclick="openMemory(1)"><img src="https://via.placeholder.com/300x300/feca57/ffffff?text=Foto+2" alt="Memori 2"></div>
                    <div class="mem-photo large" onclick="openMemory(2)"><img src="https://via.placeholder.com/300x300/ff6b6b/ffffff?text=Foto+3" alt="Memori 3"></div>
                </div>
                <!-- Baris Bawah (4 Foto Sedikit Lebih Kecil) -->
                <div class="mem-row-bottom">
                    <!-- Ganti link gambar di bawah ini dengan fotomu -->
                    <div class="mem-photo small" onclick="openMemory(3)"><img src="https://via.placeholder.com/300x300/48dbfb/ffffff?text=Foto+4" alt="Memori 4"></div>
                    <div class="mem-photo small" onclick="openMemory(4)"><img src="https://via.placeholder.com/300x300/1dd1a1/ffffff?text=Foto+5" alt="Memori 5"></div>
                    <div class="mem-photo small" onclick="openMemory(5)"><img src="https://via.placeholder.com/300x300/5f27cd/ffffff?text=Foto+6" alt="Memori 6"></div>
                    <div class="mem-photo small" onclick="openMemory(6)"><img src="https://via.placeholder.com/300x300/ff4757/ffffff?text=Foto+7" alt="Memori 7"></div>
                </div>
            </div>

            <div style="margin-top: 40px;">
                <button id="love-btn" class="pulse-btn">Pencet Aku Dong! ❤️</button>
            </div>
        </div>
    </div>

    <!-- Modal Pop-Up Universal (Untuk Galaksi & Memori Foto) -->
    <div id="popup-modal" class="hidden">
        <div class="popup-glass">
            <button id="close-popup"><i class="fas fa-times"></i></button>
            
            <!-- Tempat Foto (Khusus Mode Memori) -->
            <img id="popup-img" src="" alt="Memory" style="display:none; width:100%; height:180px; object-fit:cover; border-radius:10px; margin-bottom:15px; border: 3px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.2);">
            
            <!-- Tempat Emoji (Khusus Mode Galaksi) -->
            <div id="popup-emoji">🧸</div>
            
            <h2 id="popup-title">Judul</h2>
            <p id="popup-text">Isi pesan romantis ada di sini...</p>
        </div>
    </div>

    <!-- Navigasi Bawah -->
    <div id="nav-controls" class="hidden">
        <button id="btn-prev" class="nav-btn"><i class="fas fa-chevron-left"></i> Back</button>
        <button id="btn-next" class="nav-btn">Next <i class="fas fa-chevron-right"></i></button>
    </div>

    <script src="script.js"></script>
</body>
</html>
